<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0c0d0f;
      --surface:     #141618;
      --surface-hi:  #1c1e22;
      --border:      #272a30;
      --border-hi:   #35393f;
      --text:        #e2e4e9;
      --muted:       #5c6170;
      --accent:      #5b8af0;
      --accent-lo:   #1a2845;
      --user-bg:     #172036;
      --bot-bg:      #18191d;
      --ok:          #3ecf8e;
      --err:         #f06e6e;
      --r:           10px;
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'Geist', sans-serif;
      font-size: 14px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; height: 100vh; width: 100vw; }

    /* Sidebar */
    .sidebar {
      width: 272px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 22px 18px; gap: 24px;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }
    .brand-mark svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; }
    .brand-name { font-size: 14px; font-weight: 500; letter-spacing: -.2px; }
    .brand-sub  { font-size: 11px; color: var(--muted); font-family: 'Geist Mono', monospace; }

    .label {
      font-size: 10px; font-weight: 500;
      letter-spacing: 1.3px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 9px;
    }

    .drop-zone {
      border: 1.5px dashed var(--border-hi);
      border-radius: var(--r);
      padding: 18px 12px; text-align: center;
      cursor: pointer; position: relative;
      transition: border-color .2s, background .2s;
    }
    .drop-zone:hover, .drop-zone.over {
      border-color: var(--accent);
      background: rgba(91,138,240,.05);
    }
    .drop-zone input[type=file] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { color: var(--muted); margin-bottom: 7px; }
    .drop-icon svg { width: 26px; height: 26px; stroke: currentColor; fill: none; stroke-width: 1.4; stroke-linecap: round; }
    .drop-hint { font-size: 12px; color: var(--muted); line-height: 1.5; }
    .drop-hint strong { color: var(--accent); font-weight: 400; }

    .file-pill {
      display: none; align-items: center; gap: 7px;
      padding: 7px 10px; margin-top: 9px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; font-size: 11px; color: var(--muted);
      font-family: 'Geist Mono', monospace; overflow: hidden;
    }
    .file-pill svg { flex-shrink: 0; width: 13px; height: 13px; stroke: var(--accent); fill: none; stroke-width: 2; }
    .file-pill span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .up-btn {
      margin-top: 10px; width: 100%; padding: 9px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--r);
      font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 7px; transition: opacity .18s;
    }
    .up-btn:hover { opacity: .88; }
    .up-btn:disabled { opacity: .38; cursor: not-allowed; }

    #uploadStatus {
      font-size: 11.5px; margin-top: 9px; min-height: 16px;
      line-height: 1.5; color: var(--muted); text-align: center;
    }
    #uploadStatus.ok  { color: var(--ok); }
    #uploadStatus.err { color: var(--err); }

    .session-block { margin-top: auto; }
    .session-badge {
      display: block; padding: 8px 10px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px; color: var(--muted);
      word-break: break-all; line-height: 1.6;
    }

    /* Chat pane */
    .chat-pane {
      flex: 1; display: flex; flex-direction: column;
      min-width: 0; background: var(--bg);
    }

    .chat-head {
      padding: 15px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .chat-head-title { font-size: 14px; font-weight: 500; }
    .chat-head-sub   { font-size: 12px; color: var(--muted); font-family: 'Geist Mono', monospace; }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ok); box-shadow: 0 0 7px var(--ok);
      display: inline-block; margin-right: 7px;
    }

    .messages {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 10px; }

    .row      { display: flex; gap: 9px; max-width: 700px; }
    .row.user { align-self: flex-end;   flex-direction: row-reverse; }
    .row.bot  { align-self: flex-start; }

    .av {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500; margin-top: 3px;
      font-family: 'Geist Mono', monospace;
    }
    .av.u { background: var(--accent-lo); color: var(--accent); }
    .av.b { background: var(--surface-hi); border: 1px solid var(--border-hi); color: var(--muted); }

    .bubble {
      padding: 10px 14px; border-radius: 11px;
      font-size: 13.5px; line-height: 1.65; max-width: 540px;
    }
    .row.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(91,138,240,.25);
      border-bottom-right-radius: 3px;
    }
    .row.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }

    .source-tag {
      display: block; margin-top: 7px; font-size: 11px;
      color: var(--muted); font-family: 'Geist Mono', monospace;
      border-top: 1px solid var(--border); padding-top: 6px;
    }

    .dots { display: flex; gap: 4px; align-items: center; padding: 13px 14px; }
    .dots span {
      width: 5px; height: 5px; border-radius: 50%; background: var(--muted);
      animation: bop .85s infinite ease-in-out;
    }
    .dots span:nth-child(2) { animation-delay: .17s; }
    .dots span:nth-child(3) { animation-delay: .34s; }
    @keyframes bop {
      0%,80%,100% { transform: translateY(0); opacity:.45; }
      40%          { transform: translateY(-5px); opacity:1; }
    }

    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); font-size: 13px;
    }
    .empty svg { opacity: .25; stroke: var(--muted); fill: none; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
    .empty p { text-align: center; line-height: 1.7; max-width: 220px; }

    .input-bar {
      padding: 14px 24px; border-top: 1px solid var(--border);
      flex-shrink: 0; display: flex; gap: 9px; align-items: center;
    }
    .input-wrap {
      flex: 1; display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 0 14px; transition: border-color .18s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    .input-wrap input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: 'Geist', sans-serif;
      font-size: 13.5px; padding: 11px 0;
    }
    .input-wrap input::placeholder { color: var(--muted); }

    .send {
      width: 40px; height: 40px; border-radius: 9px;
      border: none; background: var(--accent); color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: opacity .18s, transform .1s;
    }
    .send:hover   { opacity: .88; }
    .send:active  { transform: scale(.94); }
    .send:disabled { opacity: .35; cursor: not-allowed; }
    .send svg { width: 15px; height: 15px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .spin {
      width: 13px; height: 13px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.22);
      border-top-color: #fff;
      animation: rot .55s linear infinite; flex-shrink: 0;
    }
    @keyframes rot { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 20 20"><path d="M3 5h14M3 10h9M3 15h11"/></svg>
      </div>
      <div>
        <div class="brand-name">RAG Chat</div>
        <div class="brand-sub">Document QA</div>
      </div>
    </div>

    <div>
      <div class="label">Upload document</div>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".pdf,.txt,.docx,.md">
        <div class="drop-icon">
          <svg viewBox="0 0 24 24"><path d="M12 15V7M9 10l3-3 3 3"/><rect x="3" y="3" width="18" height="18" rx="3"/></svg>
        </div>
        <div class="drop-hint"><strong>Choose file</strong> or drag here<br>PDF · TXT · DOCX · MD</div>
      </div>

      <div class="file-pill" id="filePill">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span id="pillName"></span>
      </div>

      <button class="up-btn" id="uploadBtn" onclick="uploadFile()">
        <span id="uploadBtnLabel">Upload &amp; Index</span>
      </button>
      <div id="uploadStatus"></div>
    </div>

    <div class="session-block">
      <div class="label">Active session</div>
      <span class="session-badge" id="sessionDisplay">{{ session_id }}</span>
    </div>
  </aside>

  <main class="chat-pane">
    <div class="chat-head">
      <div>
        <div class="chat-head-title"><span class="live-dot"></span>Document Assistant</div>
        <div class="chat-head-sub">Ask questions about your uploaded file</div>
      </div>
    </div>

    <div class="messages" id="chatWindow">
      <div class="empty" id="emptyState">
        <svg width="46" height="46" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <p>Upload a document, then ask anything about it.</p>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <input type="text" id="userInput" placeholder="Ask a question about your document…" autocomplete="off">
      </div>
      <button class="send" id="sendBtn" onclick="sendMessage()" aria-label="Send">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </main>

</div>

<script>
 const sessionId = "{{ session_id }}";

  document.getElementById('fileInput').addEventListener('change', function () {
    const f = this.files[0];
    if (!f) return;
    const pill = document.getElementById('filePill');
    document.getElementById('pillName').textContent = f.name;
    pill.style.display = 'flex';
    const s = document.getElementById('uploadStatus');
    s.textContent = ''; s.className = '';
  });

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f) {
      document.getElementById('fileInput').files = e.dataTransfer.files;
      document.getElementById('fileInput').dispatchEvent(new Event('change'));
    }
  });

async function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    const status    = document.getElementById('uploadStatus');
    if (!fileInput.files[0]) return alert("Select a file first");

    const btn   = document.getElementById('uploadBtn');
    const label = document.getElementById('uploadBtnLabel');
    
    // UI Loading state indicators
    btn.disabled = true;
    label.innerHTML = '<div class="spin"></div>Indexing\u2026';
    status.className = '';
    status.textContent = 'Uploading and parsing large document (this may take a minute)\u2026';

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    try {
      // Standard browser fetch has no default timeout, but our backend now holds open safely
      const response = await fetch('/upload', { method: 'POST', body: formData });
      const result   = await response.json();

      if (response.ok && result.success !== false) {
        status.className = 'ok';
        status.textContent = '\u2713 ' + (result.filename || fileInput.files[0].name) + ' indexed successfully';
      } else {
        status.className = 'err';
        // Extract the explicit detail sent back from our Flask try/except block
        status.textContent = '\u2717 ' + (result.detail || 'Upload failed');
      }
    } catch (err) {
      status.className = 'err';
      status.textContent = '\u2717 Connection interrupted while processing heavy layout parsing.';
      console.error("Upload error details:", err);
    } finally {
      // FIXED: Always re-enable the button when the loop finishes, regardless of success or failure
      btn.disabled = false;
      label.textContent = 'Upload & Index';
    }
  }

  function killEmpty() {
    const e = document.getElementById('emptyState');
    if (e) e.remove();
  }

  function addMsg(role, html) {
    const win = document.getElementById('chatWindow');
    const row = document.createElement('div');
    row.className = 'row ' + role;
    const av = document.createElement('div');
    av.className = 'av ' + (role === 'user' ? 'u' : 'b');
    av.textContent = role === 'user' ? 'U' : 'AI';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = html;
    row.appendChild(av); row.appendChild(bub);
    win.appendChild(row);
    win.scrollTop = win.scrollHeight;
  }

  // Generates a unique typing row block tied directly to a specific message request loop
  function showTyping(typingId) {
    const win = document.getElementById('chatWindow');
    const row = document.createElement('div');
    row.className = 'row bot'; 
    row.id = typingId; // Unique element tracking ID
    const av = document.createElement('div');
    av.className = 'av b'; av.textContent = 'AI';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
    row.appendChild(av); row.appendChild(bub);
    win.appendChild(row);
    win.scrollTop = win.scrollHeight;
  }

  function hideTyping(typingId) {
    const t = document.getElementById(typingId);
    if (t) t.remove();
  }

  /* Optimized: Removed input blocking and shifted to unique loop tracking tokens */
  async function sendMessage() {
    const input    = document.getElementById('userInput');
    const question = input.value.trim();
    if (!question) return;

    // Generate a temporary unique footprint for this specific prompt request
    const uniqueRequestId = 'typing_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);

    killEmpty();
    addMsg('user', question);
    
    // Clear the input right away so the user can begin typing their next question instantly
    input.value = ''; 
    
    // Create an isolated indicator for this background request
    showTyping(uniqueRequestId);

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: question, session_id: sessionId })
      });
      const data = await response.json();

      // Wipe out only the typing element assigned to this request
      hideTyping(uniqueRequestId);

      let sourceHtml = '';
      if (data.sources && data.sources.length > 0) {
        sourceHtml = '<span class="source-tag">Sources: ' + data.sources.join(', ') + '</span>';
      }
      addMsg('bot', data.answer + sourceHtml);

    } catch (err) {
      hideTyping(uniqueRequestId);
      addMsg('bot', '<span style="color:var(--err);">\u2717 Failed to fetch response. Please try again.</span>');
    }
  }

  document.getElementById('userInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') sendMessage();
  });
</script>

</body>
</html>
